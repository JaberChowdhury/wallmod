<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Cyan to Blue Neon Gradient -->
    <linearGradient id="cyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Magenta to Purple Accent Gradient -->
    <linearGradient id="magentaPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Drop Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Interlocking abstract shapes representing Wallmod (W and M) and Color Palettes -->
  
  <!-- Outer Ring representing Sync / Theming -->
  <path d="M 256 64 A 192 192 0 1 1 64 256" fill="none" stroke="url(#cyanBlue)" stroke-width="44" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Inner Abstract W/M -->
  <path d="M 140 340 L 200 180 L 256 280 L 312 180 L 372 340" fill="none" stroke="url(#magentaPurple)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)"/>

  <!-- Accent dots representing color nodes -->
  <circle cx="140" cy="340" r="22" fill="#f857a6" filter="url(#glow)"/>
  <circle cx="372" cy="340" r="22" fill="#ff5858" filter="url(#glow)"/>
</svg>
