name: Rust CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libwayland-dev libxkbcommon-dev libfontconfig1-dev libgtk-3-dev

      - name: Cache Cargo registries & target
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Formatting
        run: cargo fmt --all -- --check
        continue-on-error: true # Warning only for now

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true # Warning only for now

      - name: Run Tests
        run: cargo test --verbose

  release:
    name: Build & Release (Production)
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: wallmod
            asset_name: wallmod-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: wallmod
            asset_name: wallmod-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: wallmod
            asset_name: wallmod-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: wallmod.exe
            asset_name: wallmod-windows-x86_64
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libwayland-dev libxkbcommon-dev libfontconfig1-dev libgtk-3-dev

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-deb (Linux only)
        if: runner.os == 'Linux'
        run: cargo install cargo-deb

      - name: Create Deb Package (Linux only)
        if: runner.os == 'Linux'
        run: cargo deb --target ${{ matrix.target }}

      - name: Prepare Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/
          cd dist
          tar -czvf ../${{ matrix.asset_name }}.tar.gz ${{ matrix.binary_name }}

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target\${{ matrix.target }}\release\${{ matrix.binary_name }} dist\
          Compress-Archive -Path dist\${{ matrix.binary_name }} -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Publish Release (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/debian/*.deb
            ${{ matrix.asset_name }}.tar.gz
          generate_release_notes: true
          append_body: true

      - name: Publish Release (Unix Tarball)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
          generate_release_notes: true
          append_body: true

      - name: Publish Release (Windows Zip)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}.zip
          generate_release_notes: true
          append_body: true
