name: Rust CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install System Dependencies (Iced / RFD / Wayland)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libwayland-dev libxkbcommon-dev libfontconfig1-dev libgtk-3-dev

      - name: Cache Cargo registries & target
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Formatting
        run: cargo fmt --all -- --check
        continue-on-error: true # Warning only for now

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true # Warning only for now

      - name: Build Project
        run: cargo build --release --verbose

      - name: Run Tests
        run: cargo test --verbose

  release:
    name: Build & Release (Production)
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libwayland-dev libxkbcommon-dev libfontconfig1-dev libgtk-3-dev

      - name: Build Release Binary
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Create Deb Package
        run: cargo deb

      - name: Create Tarball
        run: |
          tar -czvf wallmod-linux-x86_64.tar.gz -C target/release wallmod

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            wallmod-linux-x86_64.tar.gz
          generate_release_notes: true
